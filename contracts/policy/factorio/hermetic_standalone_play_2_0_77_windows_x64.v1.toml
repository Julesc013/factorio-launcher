status = "frozen_criteria_no_result"

human_journey = [
  "select_exact_instance",
  "inspect_readiness",
  "review_exact_menu_launch_plan",
  "issue_one_exact_permit_in_the_later_candidate",
  "provider_independently_revalidates",
  "start_factorio",
  "observe_normal_factorio_main_menu",
  "confirm_no_save_was_automatically_loaded",
  "create_disposable_game_or_explicitly_load_test_save",
  "save_and_return_to_menu",
  "exit_normally",
  "complete_postrun_observation",
  "inspect_last_run_result",
  "relaunch_with_fresh_authority_and_confirm_save_visibility",
  "exit_normally_again",
]

automated_negative_controls = [
  "mutate_authenticated_permit_claim",
  "replay_permit_sequentially",
  "replay_permit_concurrently",
  "expire_permit",
  "change_launch_intent",
  "change_isolation_mode",
  "stale_readiness",
  "replace_executable_same_path",
  "replace_effective_config",
  "change_modset_state",
  "change_installation_evidence",
  "select_sibling_instance",
  "attempt_concurrent_launch",
  "cancel_before_process_creation",
  "cancel_during_execution",
  "force_timeout",
  "force_process_crash",
  "fail_journal_write",
  "present_stale_run_lock",
  "restart_provider_session",
  "restart_issuer_session",
  "lose_observer_events",
  "add_wildcard_or_prefix_resource",
  "change_protected_root_identity",
  "write_os_global_temporary_directory",
]

explicit_exclusions = [
  "whole_host_immutability",
  "steam_aware_play",
  "other_factorio_versions",
  "other_operating_systems",
  "third_party_modpacks",
  "account_or_credential_bindings",
  "networked_mod_acquisition",
  "load_save_intent",
  "new_game_intent",
  "map_editor_intent",
  "connect_server_intent",
  "start_server_intent",
  "benchmark_intent",
  "instrumented_dev_intent",
  "installation_or_instance_preparation",
  "universal_setup_mutation",
  "signing_and_publication",
]

[claim]
claim_id = "factorio.hermetic_process_tree.v1"
user_label = "Hermetic standalone"
guarantee = "No persistent filesystem or registry write attributable to FacMan, Factorio, or their supervised process tree may occur outside the exact writable resources bound by the reviewed operation."
whole_host_immutability_claimed = false
external_unobserved_disclosed = true

[candidate]
platform = "windows"
architecture = "x86_64"
factorio_version = "2.0.77"
distribution = "standalone_non_steam"
source_authentication = "sha256_bound_to_authenticated_wube_source"
filesystem = "ntfs"
volume = "fixed_local"
reparse_policy = "no_links_or_reparse_points_in_bound_closure"
instance_ownership = "facman_owned"
content_capability_requirement = "base_game"
optional_content_treatment = "reported_capability_not_entitlement"
mod_state = "explicit_empty_lock"
account_requirement = "none"
credential_requirement = "none"
network_requirement = "none"
candidate_revision_binding = "exact_reviewed_candidate_revision_required"

[provider_baseline]
universal_launcher_revision = "7bd4425f0c35414f738159b45d8bec42edf70235"
universal_setup_revision = "3f8489275077347c2918f3bb03614ec6431362ff"
facman_candidate_revision = "bound_by_candidate_evidence"
process_provider_revision = "bound_by_candidate_evidence"
observation_provider_revision = "bound_by_candidate_evidence"

[launch]
operation_kind = "instance.play"
intent = "menu"
isolation_mode = "hermetic"
permitted_effects = ["workspace_read", "workspace_write", "process_execute"]
required_capabilities = ["launch.execute.hermetic", "process.execute"]
direct_save_allowed = false
scenario_allowed = false
server_allowed = false
editor_allowed = false
benchmark_allowed = false
multiplayer_connect_allowed = false
network_allowed = false
credentials_allowed = false
preparation_allowed = false
setup_allowed = false
factorio_update_checks = "disabled"
mod_updates = "disabled"
process_environment = "versioned_minimal"
temporary_directory_policy = "workspace_operation_temporary_only"

