[[verdict_criteria]]
schema = "factorio.play_verdict_criteria.v1"
result = "Pass"
requires_human_review = true
conditions = [
  "candidate_policy_plan_evidence_provider_and_permit_identities_match",
  "provider_consumes_the_permit_exactly_once",
  "factorio_opens_to_the_normal_main_menu",
  "no_save_or_alternate_launch_intent_is_inferred",
  "selected_instance_data_is_visible_and_usable",
  "saving_and_freshly_authorized_relaunch_work",
  "no_attributed_write_occurs_outside_writable_roots",
  "all_protected_roots_remain_identity_and_content_equivalent",
  "no_observation_event_or_required_manifest_is_lost",
  "run_session_state_is_honest_and_complete",
  "human_reviewer_signs_the_exact_hash_closed_evidence_packet",
]
observation_gaps_allowed = false
hash_closed_packet_required = true
grants_authority = false
disposition = "eligible_for_separate_exact_route_promotion"
scope_after_verdict = "Only the exact reviewed Windows x64 standalone 2.0.77 menu/hermetic candidate may become eligible for a separate authority promotion."
notes = "Pass is evidence, not self-executing authority."

[[verdict_criteria]]
schema = "factorio.play_verdict_criteria.v1"
result = "Fail"
requires_human_review = true
conditions = [
  "selected_or_sibling_installation_changes",
  "default_or_global_factorio_data_changes",
  "steam_or_other_external_protected_domain_changes",
  "any_attributed_write_occurs_outside_the_writable_set",
  "wrong_intent_or_implicit_save_load_occurs",
  "stale_replayed_or_mismatched_permit_is_accepted",
  "required_player_journey_fails_because_of_the_candidate",
  "recovery_or_postrun_state_is_falsely_reported_complete",
  "unexpected_attributable_persistent_state_change_occurs",
  "exact_bound_resource_is_replaced_or_bypassed",
]
observation_gaps_allowed = false
hash_closed_packet_required = true
grants_authority = false
disposition = "bounded_repair_required"
scope_after_verdict = "Open a repair WorkUnit bound to observed evidence; do not weaken this policy retroactively."
notes = "Fail never grants authority."

[[verdict_criteria]]
schema = "factorio.play_verdict_criteria.v1"
result = "Inconclusive"
requires_human_review = true
conditions = [
  "observer_loses_events_or_reports_overflow",
  "baseline_or_postrun_manifest_cannot_be_completed",
  "candidate_or_bound_evidence_changes_during_the_run",
  "unrelated_host_activity_prevents_required_attribution",
  "host_restarts_or_observation_provider_fails",
  "human_reviewer_cannot_establish_the_required_ui_result",
  "evidence_packet_is_incomplete_corrupt_or_not_hash_closed",
  "stable_identity_or_target_resolution_is_ambiguous",
]
observation_gaps_allowed = false
hash_closed_packet_required = true
grants_authority = false
disposition = "improve_observation_and_repeat"
scope_after_verdict = "Improve observation and repeat against the same frozen policy, or review a new policy revision with an explicit reason."
notes = "Inconclusive is mandatory when required evidence is unavailable."

