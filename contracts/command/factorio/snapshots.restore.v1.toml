command_id = "snapshots.restore"
cli = "facman snapshots restore <snapshot-path> <target-instance-id> --json"
effects = ["workspace_read", "workspace_write"]
request_schema = "contracts/schema/command/snapshots.restore.request.v1.schema.json"
response_schema = "contracts/schema/factorio/factorio_snapshot_report.v1.schema.json"
result_schema = "contracts/result/result.v1.schema.json"
refusal_schema = "contracts/refusal/refusal.v1.schema.json"
diagnostic_schema = "contracts/diagnostic/diagnostic.v1.schema.json"
dry_run_default = true
executes_process = false
mutates_workspace = true
golden_success = "tests/golden/commands/snapshots.restore.success.json"
golden_refusal = "tests/golden/commands/snapshots.restore.refusal.json"
