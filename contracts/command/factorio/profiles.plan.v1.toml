effects = ["workspace_read"]
request_schema = "contracts/schema/command/profiles.plan.request.v1.schema.json"
response_schema = "contracts/schema/factorio/factorio_effective_profile.v1.schema.json"
result_schema = "contracts/result/result.v1.schema.json"
refusal_schema = "contracts/refusal/refusal.v1.schema.json"
