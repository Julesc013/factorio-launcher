schema = "facman.frontend.surface.v1"
source_contract = "contracts/command/frontend/frontend.required_commands.v1.toml"
parity_model = "command_result_refusal"

proof_requirements = [
  "command_graph",
  "result_shape",
  "refusal_shape",
  "effect_risk",
]

status_values = [
  "implemented",
  "stubbed_with_refusal",
  "not_supported_with_reason",
]

[[parity_group]]
id = "native_shell_proof"
frontends = ["windows.winforms", "macos.appkit"]
required_status = "implemented"
deferred_status = "not_supported_with_reason"
claim = "First native GUI shells must match command/result/refusal coverage, not visual design."

[[parity_group]]
id = "terminal_surfaces"
frontends = ["cli", "tui"]
required_status = "declared"
deferred_status = "declared"
claim = "Terminal frontends must account for the same command graph."

[[parity_group]]
id = "future_native_shells"
frontends = ["windows.winui", "macos.swiftui", "linux.gtk", "linux.qt"]
required_status = "declared"
deferred_status = "declared"
claim = "Future GUI lanes may be stubbed, but they must not disappear from the surface contract."
