schema = "facman.frontend.required_commands.v1"
owner = "factorio-launcher"
description = "Command parity contract for FacMan CLI, TUI, daemon, and GUI frontends."
status_values = ["implemented", "stubbed_with_refusal", "not_supported_with_reason"]

[sets]
required = [
  "help",
  "version",
  "doctor",
  "product.inspect",
  "command_graph.inspect",
  "installs.scan",
  "installs.import",
  "installs.inspect",
  "instances.list",
  "instances.create",
  "launch_plan.build",
  "launch_plan.preflight",
  "run.preview",
]
optional = [
  "diagnostics.export",
  "diagnostics.redact",
  "dev.bug_report",
  "mods.import",
  "modsets.lock",
  "modsets.verify",
  "modsets.export",
  "saves.list",
  "saves.backup",
  "saves.clone",
  "instance.export",
  "instance.import",
  "instances.inspect",
  "instances.verify",
  "instances.diff",
  "instances.clone",
  "instances.rename",
  "instances.archive",
  "instances.restore",
  "preferences.apply",
  "preferences.inspect",
  "preferences.plan",
  "preferences.reset.apply",
  "preferences.reset.plan",
  "preferences.validate",
  "workspace.recovery.inspect",
  "workspace.recovery.plan",
  "workspace.recovery.apply",
  "servers.create",
  "servers.list",
]
unavailable = [
  "dev.benchmark",
  "dev.dump_data",
  "dev.dump_icons",
  "dev.instrument_mod",
  "installs.install_version",
  "installs.repair",
  "installs.uninstall",
  "installs.verify",
  "mods.install",
  "mods.search",
  "mods.update",
  "package.verify",
  "run.execute",
  "servers.rcon",
  "servers.start",
  "servers.stop",
  "setup.preview",
]

[[commands]]
id = "help"
phase = "required"
backend_id = "app.help"
cli = "facman --help"

[[commands]]
id = "version"
phase = "required"
backend_id = "app.version"
cli = "facman --version"

[[commands]]
id = "doctor"
phase = "required"
backend_id = "doctor.run"
cli = "facman doctor --json"

[[commands]]
id = "product.inspect"
phase = "required"
backend_id = "product.inspect"
cli = "facman product inspect --json"

[[commands]]
id = "command_graph.inspect"
phase = "required"
backend_id = "command_graph.inspect"
cli = "facman command-graph inspect --json"

[[commands]]
id = "installs.scan"
phase = "required"
backend_id = "installs.scan"
cli = "facman installs scan --json"

[[commands]]
id = "installs.import"
phase = "required"
backend_id = "installs.import"
cli = "facman installs import <path> --id <install-id> --json"

[[commands]]
id = "installs.inspect"
phase = "required"
backend_id = "installs.inspect"
cli = "facman installs inspect <install-id> --json"

[[commands]]
id = "instances.list"
phase = "required"
backend_id = "instance.list"
cli = "facman instances list --json"

[[commands]]
id = "instances.create"
phase = "required"
backend_id = "instances.create"
cli = "facman instances create <id> --install <install-id> --json"

[[commands]]
id = "instances.inspect"
phase = "optional"
backend_id = "instances.inspect"
cli = "facman instances inspect <instance-id> --json"

[[commands]]
id = "instances.verify"
phase = "optional"
backend_id = "instances.verify"
cli = "facman instances verify <instance-id> --json"

[[commands]]
id = "instances.diff"
phase = "optional"
backend_id = "instances.diff"
cli = "facman instances diff <left-instance-id> <right-ref> --json"

[[commands]]
id = "instances.clone"
phase = "optional"
backend_id = "instances.clone"
cli = "facman instances clone <source-id> <destination-id> --json"

[[commands]]
id = "instances.rename"
phase = "optional"
backend_id = "instances.rename"
cli = "facman instances rename <instance-id> --name <display-name> --json"

[[commands]]
id = "instances.archive"
phase = "optional"
backend_id = "instances.archive"
cli = "facman instances archive <instance-id> --json"

[[commands]]
id = "instances.restore"
phase = "optional"
backend_id = "instances.restore"
cli = "facman instances restore <archive-id> --json"

[[commands]]
id = "launch_plan.build"
phase = "required"
backend_id = "launch_plan.build"
cli = "facman launch plan <instance-id> --json"

[[commands]]
id = "launch_plan.preflight"
phase = "required"
backend_id = "launch_plan.preflight"
cli = "facman launch plan <instance-id> --preflight --json"

[[commands]]
id = "run.preview"
phase = "required"
backend_id = "run.preview"
cli = "facman run <instance-id> --json"

[[commands]]
id = "diagnostics.export"
phase = "optional"
backend_id = "diagnostics.export"
cli = "facman diagnostics export --instance <instance-id> --out <bundle.zip> --json"

[[commands]]
id = "run.execute"
phase = "unavailable"
backend_id = "run.execute"
cli = "facman run <instance-id> --execute --json"

[[commands]]
id = "modsets.lock"
phase = "optional"
backend_id = "modsets.lock"
cli = "facman modsets lock <instance-id> --json"

[[commands]]
id = "mods.import"
phase = "optional"
backend_id = "mods.import"
cli = "facman mods import <mod.zip> --instance <instance-id> --json"

[[commands]]
id = "modsets.verify"
phase = "optional"
backend_id = "modsets.verify"
cli = "facman modsets verify <instance-id> --json"

[[commands]]
id = "modsets.export"
phase = "optional"
backend_id = "modsets.export"
cli = "facman modsets export <instance-id> <pack.zip> --json"

[[commands]]
id = "saves.list"
phase = "optional"
backend_id = "saves.list"
cli = "facman saves list --instance <instance-id> --json"

[[commands]]
id = "saves.backup"
phase = "optional"
backend_id = "saves.backup"
cli = "facman saves backup <instance-id> --json"

[[commands]]
id = "saves.clone"
phase = "optional"
backend_id = "saves.clone"
cli = "facman saves clone <save> --instance <source-id> --to-instance <target-id> --json"

[[commands]]
id = "instance.export"
phase = "optional"
backend_id = "instance.export"
cli = "facman export instance <instance-id> --output <path> --json"

[[commands]]
id = "instance.import"
phase = "optional"
backend_id = "instance.import"
cli = "facman import instance <path> --json"

[[commands]]
id = "workspace.recovery.inspect"
phase = "optional"
backend_id = "workspace.recovery.inspect"
cli = "facman workspace recovery inspect --json"

[[commands]]
id = "workspace.recovery.plan"
phase = "optional"
backend_id = "workspace.recovery.plan"
cli = "facman workspace recovery plan <transaction-id> --json"

[[commands]]
id = "workspace.recovery.apply"
phase = "optional"
backend_id = "workspace.recovery.apply"
cli = "facman workspace recovery apply <transaction-id> --json"

[[commands]]
id = "setup.preview"
phase = "unavailable"
backend_id = "install_local.plan"
cli = "facman installs install-version <version> --archive <path> --json"

[[commands]]
id = "diagnostics.redact"
phase = "optional"
backend_id = "diagnostics.redact"
cli = "facman diagnostics redact <path> --json"

[[commands]]
id = "dev.bug_report"
phase = "optional"
backend_id = "dev.bug_report"
cli = "facman dev bug-report --json"

[[commands]]
id = "preferences.inspect"
phase = "optional"
backend_id = "preferences.inspect"
