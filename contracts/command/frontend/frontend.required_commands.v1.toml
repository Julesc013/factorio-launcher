"launch_plan.build" = "stubbed_with_refusal"
"run.preview" = "stubbed_with_refusal"
"diagnostics.export" = "stubbed_with_refusal"
"run.execute" = "not_supported_with_reason"
"modsets.lock" = "not_supported_with_reason"
"saves.backup" = "not_supported_with_reason"
"export.instance" = "not_supported_with_reason"
