product_id = "factorio"
display_name = "Factorio"
public_name = "FacMan - an unofficial launcher and isolated instance manager for Factorio"
binding = "factorio-product-binding"
schema_version = 1
unofficial = true

capabilities = [
  "gui",
  "headless_server",
  "mods",
  "saves",
  "profiles",
  "benchmarks",
  "map_preview",
  "mod_devtools",
]

[boundaries]
bundles_factorio_binaries = false
repairs_foreign_installs = false
uninstalls_foreign_installs = false
uses_official_branding = false
default_run_mode = "dry-run"
