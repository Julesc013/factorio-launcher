schema = "facman.release_profile.v1"
id = "portable_tui_x64"
lane = "portable_tui"
target_os = "portable"
target_arch = "x64"
minimum_os = "portable_tui_baseline"
runtime_floor = "native C runtime"
support_tier = "portable"
package_types = ["portable_zip", "tarball"]
install_modes = ["portable", "user", "system"]
package_manifest = "release/packaging/portable/portable_tui.v1.toml"
frontend_manifest = "contracts/command/frontend/frontend.required_commands.v1.toml"
support_matrix = "release/index/support_matrix.v1.toml"
release_index = "release/index/release_index.v1.toml"
contracts_path = "contracts/schema"
content_path = "content/factorio"
licenses = ["LICENSE", "THIRD_PARTY_NOTICES.md", "LICENSES/Miniz.txt", "LICENSES/PicoJSON.txt"]
bundles_factorio_binaries = false
credential_storage = false
runtime_claim = "experimental_scaffold_not_product"
publication = false
required_cmake_option = "FACMAN_BUILD_EXPERIMENTAL_FRONTENDS=ON"

[frontends]
cli = "apps/cli"
tui = "apps/tui"

[entrypoints]
cli = "bin/facman"
tui = "bin/facman-tui"

[required_components]
binaries = ["bin/facman", "bin/facman-tui"]
libraries = ["lib/ulk", "lib/usk", "lib/flb_factorio"]
contracts = "contracts/schema"
content = "content/factorio"
licenses = ["LICENSE", "THIRD_PARTY_NOTICES.md", "LICENSES/Miniz.txt", "LICENSES/PicoJSON.txt"]
frontend_manifest = "contracts/command/frontend/frontend.required_commands.v1.toml"
package_manifest = "release/packaging/portable/portable_tui.v1.toml"
support_matrix = "release/index/support_matrix.v1.toml"

[capabilities]
setup_mutation = false
network_download = false
mod_portal_download = false
server_execution = false
devtool_execution = false
auto_update = false

[unsupported]
features = [
  "gui_frontend",
  "mod_portal_download",
  "network_download",
  "setup_mutation",
  "server_execution",
  "devtool_execution",
  "auto_update",
]
commands = ["mod_portal.download", "server.execute", "devtools.execute", "setup.apply"]
