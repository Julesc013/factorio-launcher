schema = "facman.packaging.bundle_manifest.v1"
artifact_id = "FacMan-<version>-linux-legacy-cli-x86_64"
platform = "linux"
support_level = "legacy_best_effort"
package_type = "tarball"
architecture = "x86_64"
linkage_model = "static_first_with_reference_components"
python_runtime = false
bundles_factorio_binaries = false
entrypoint = "usr/bin/facman"
gui_stack_required = false

[[components]]
name = "cli"
source_target = "facman_cli"
destination = "usr/bin/facman"
required_platform = "linux"
architecture = "x86_64"
hash = "BUILD_TIME"
signature_policy = "manifest_hash"
extraction_policy = "none"
runtime_search_path = "usr/bin"
license_notice = "THIRD_PARTY_NOTICES.md"
runtime_role = "runtime_required"

