schema = "facman.packaging.bundle_manifest.v1"
artifact_id = "FacMan-<version>-linux-x86_64.AppImage"
platform = "linux"
support_level = "primary_modern"
package_type = "appimage"
architecture = "x86_64"
python_runtime = false
bundles_factorio_binaries = false
entrypoint = "AppRun"

[[components]]
name = "gtk_gui"
source_target = "facman_gtk"
destination = "usr/bin/facman-gui-gtk"
required_platform = "linux"
architecture = "x86_64"
hash = "BUILD_TIME"
signature_policy = "appimage_digest"
extraction_policy = "none"
runtime_search_path = "usr/bin"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "cli"
source_target = "facman_cli"
destination = "usr/bin/facman"
required_platform = "linux"
architecture = "x86_64"
hash = "BUILD_TIME"
signature_policy = "appimage_digest"
extraction_policy = "none"
runtime_search_path = "usr/bin"
license_notice = "THIRD_PARTY_NOTICES.md"

