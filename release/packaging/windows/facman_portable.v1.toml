schema = "facman.packaging.bundle_manifest.v1"
artifact_id = "FacMan-<version>-windows-x64-portable"
platform = "windows"
support_level = "primary"
package_type = "portable_zip"
architecture = "x64"
python_runtime = false
bundles_factorio_binaries = false
entrypoint = "FacMan.exe"

[[components]]
name = "winforms_gui"
source_target = "apps/gui/windows/winforms"
destination = "FacMan.exe"
required_platform = "windows"
architecture = "x64"
hash = "BUILD_TIME"
signature_policy = "authenticode_optional"
extraction_policy = "none"
runtime_search_path = "."
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "console_cli"
source_target = "facman_cli"
destination = "facman.exe"
required_platform = "windows"
architecture = "x64"
