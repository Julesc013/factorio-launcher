schema = "facman.packaging.bundle_manifest.v1"
artifact_id = "FacMan-<version>-macos-app"
platform = "macos"
support_level = "base"
package_type = "app_bundle"
architecture = "configured_by_track"
python_runtime = false
bundles_factorio_binaries = false
entrypoint = "FacMan.app/Contents/MacOS/FacMan"

[[components]]
name = "appkit_gui"
source_target = "apps/gui/appkit"
destination = "FacMan.app/Contents/MacOS/FacMan"
required_platform = "macos"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "@executable_path"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "cli"
source_target = "facman_cli"
destination = "FacMan.app/Contents/MacOS/facman"
