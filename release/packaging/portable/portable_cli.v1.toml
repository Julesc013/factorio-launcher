schema = "facman.packaging.bundle_manifest.v1"
artifact_id = "FacMan-<version>-portable-cli"
platform = "portable"
support_level = "portable"
package_type = "tarball"
architecture = "configured_by_track"
python_runtime = false
bundles_factorio_binaries = false
entrypoint = "bin/facman"

[[components]]
name = "console_cli"
source_target = "facman_cli"
destination = "bin/facman"
required_platform = "all"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "manifest_hash"
extraction_policy = "none"
runtime_search_path = "bin"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "ulk_shared"
source_target = "ulk_shared"
destination = "lib/ulk"
required_platform = "all"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "manifest_hash"
extraction_policy = "none"
runtime_search_path = "lib"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "usk_shared"
source_target = "usk_shared"
destination = "lib/usk"
required_platform = "all"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "manifest_hash"
extraction_policy = "none"
runtime_search_path = "lib"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "flb_factorio_shared"
source_target = "flb_factorio_shared"
destination = "lib/flb_factorio"
required_platform = "all"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "manifest_hash"
extraction_policy = "none"
runtime_search_path = "lib"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "contracts_schema"
source_target = "contracts/schema"
destination = "contracts/schema/"
required_platform = "all"
architecture = "any"
hash = "BUILD_TIME"
signature_policy = "manifest_hash"
extraction_policy = "none"
runtime_search_path = "contracts/schema"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "factorio_content"
source_target = "content/factorio"
destination = "content/factorio/"
required_platform = "all"
architecture = "any"
hash = "BUILD_TIME"
signature_policy = "manifest_hash"
extraction_policy = "none"
