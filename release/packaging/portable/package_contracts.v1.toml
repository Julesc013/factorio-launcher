schema = "facman.packaging.contract_catalog.v1"

required_profiles = [
  "windows_legacy_winforms",
  "windows_modern_winui",
  "macos_legacy_appkit",
  "macos_modern_swiftui",
  "linux_x11_gtk",
  "linux_wayland_qt",
  "portable_cli",
  "portable_tui",
]

required_content = [
  "required_binaries",
  "required_libraries",
  "contracts_path",
  "content_path",
  "licenses",
  "frontend_manifest",
  "package_manifest",
  "support_matrix",
]

[[profile]]
id = "windows_legacy_winforms"
package_kind = "portable_zip"
minimum_os = "windows_7_sp1"
architecture = "x64"
included_executables = ["FacMan.exe", "facman.exe", "facman-tui.exe", "facmand.exe"]
included_libraries = ["ulk.dll", "usk.dll", "flb_factorio.dll"]
contracts_path = "contracts/schema"
content_path = "content/factorio"
licenses = ["LICENSE", "THIRD_PARTY_NOTICES.md"]
frontend_manifest = "contracts/command/frontend/frontend.required_commands.v1.toml"
package_manifest = "release/packaging/windows/facman_portable.v1.toml"
support_matrix = "docs/platform/support_matrix.md"
unsupported_commands = ["mod_portal.download", "server.execute", "devtools.execute"]

