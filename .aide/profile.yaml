schema_version: aide.profile.template.v0
profile_id: factorio-launcher
project_name: FacMan / factorio-launcher
generated_from: aide-lite-pack-v0
status: target_initialized
purpose: >
  Repo-local AIDE Lite governance for an unofficial Factorio launcher and
  isolated instance manager. AIDE is development tooling only and is not a
  launcher runtime dependency.
current_focus:
  phase: hermetic-standalone-play-candidate
  primary_goal: >
    Implement the exact frozen Gate 4B candidate against the canonically
    promoted Gate 4A policy without broadening its claim or recording a human verdict.
  next_task: >
    Bind one Windows x64 Factorio 2.0.77 standalone non-Steam launch, with
    menu as the default and only candidate intent, to
    the accepted InstanceSpec, InstanceBinding, and InstanceReadiness plus
    exact executable, plan, installation, configuration, permit, provider,
    writable-root, protected-root, and observation identities. Keep the later
    human-reviewed result in its distinct verdict WorkUnit.
  authoritative_command_slice:
    - installs.scan
    - installs.import
    - installs.inspect
    - installs.describe
    - installs.reconcile.plan
    - instances.create
    - instances.describe
    - instances.readiness
    - launch_plan.build
    - launch_plan.preflight
    - run.preview
    - diagnostics.export
  quarantined_capabilities:
    - launch.execute.instance_isolated
    - launch.execute.hermetic
    - process.execute
    - install.existing.adoption.apply
    - network.mod_portal.read
    - credential.factorio.read
    - release.publish
  evidence_authorities:
    workspace_lock: release/index/workspace_lock.v1.toml
    threat_model: docs/architecture/threat_model.md
    claim_ledger: docs/quality/safety_claim_ledger.md
    proof_gates: docs/quality/safety_proof_gates.md
deferred_surfaces:
  - Gateway forwarding, provider/model calls, UI, runtime, and autonomous loops remain deferred.
  - Native GUI package/runtime promotion remains deferred beyond current WinForms client and AppKit compile proof.
  - Universal setup and universal launcher are sibling repos, not Factorio subtrees.
  - Real Factorio execution remains unavailable until the execution foundation and one reviewed isolation gate pass.
  - Diagnostic export remains backend-authoritative; generated desktop forms do not own export behavior.
runtime:
  gateway_forwarding: deferred
  provider_calls: forbidden_until_reviewed_phase
  model_calls: forbidden_until_reviewed_phase
product_runtime:
  depends_on_aide: false
  python_prototype_runtime: none
  production_runtime_python_dependency: false
native_direction:
  public_abi: C-compatible experimental ABI correctness floor
  internals: C/C++ native kernels with Factorio-specific complexity behind FLB
  frontends:
    - CLI
    - TUI
    - daemon
    - WinForms
    - AppKit
    - GTK
    - Qt
safety_invariants:
  - no bundled Factorio binaries
  - no ownership bypass
  - no passwords or tokens in manifests
  - no silent writes to the default Factorio data directory
  - Steam-aware Play must disclose enumerated Steam-owned external-state domains
  - hermetic Play fails on any process-tree-attributable persistent write outside exact authorised roots
  - dry-run launch plan by default
  - install mutation belongs to Universal Setup
  - install registration and legacy managed text never grant mutation authority
  - in-place authority conversion is refused; managed replacement uses a distinct staged target
  - cross-product orchestration belongs to Universal Launcher
local_state:
  root: .aide.local/
  committed: false
notes: >
  This profile records target-specific launcher truth after safe AIDE Lite Pack
  import. The launcher may use AIDE for context, validation, review packets,
  and advisory structure analysis, but product packages must not depend on
  AIDE or Python.
