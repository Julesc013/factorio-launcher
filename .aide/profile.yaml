schema_version: aide.profile.template.v0
profile_id: factorio-launcher
project_name: FLaunch / factorio-launcher
generated_from: aide-lite-pack-v0
status: target_initialized
purpose: >
  Repo-local AIDE Lite governance for an unofficial Factorio launcher and
  isolated instance manager. AIDE is development tooling only and is not a
  launcher runtime dependency.
current_focus:
  phase: production-truth-lock-in
  primary_goal: >
    Preserve repository ownership and command authority while landing public
    dependency pins, workspace lock verification, and CI evidence.
  next_task: >
    Keep command migration incremental: command authority in one slice, package
    proof in one lane, then next slice only after public evidence lands.
deferred_surfaces:
  - Gateway forwarding, provider/model calls, UI, runtime, and autonomous loops remain deferred.
  - Native GUI implementation remains deferred until command graph stability.
  - Universal setup and universal launcher are sibling repos, not Factorio subtrees.
runtime:
  gateway_forwarding: deferred
  provider_calls: forbidden_until_reviewed_phase
  model_calls: forbidden_until_reviewed_phase
product_runtime:
  depends_on_aide: false
  python_prototype_runtime: none
  production_runtime_python_dependency: false
native_direction:
  public_abi: C-compatible stable ABI
  internals: C/C++ native kernels with Factorio-specific complexity behind FLB
  frontends:
    - CLI
    - TUI
    - daemon
    - WinForms
    - AppKit
    - GTK
    - Qt
safety_invariants:
  - no bundled Factorio binaries
  - no ownership bypass
  - no passwords or tokens in manifests
  - no silent writes to the default Factorio data directory
  - dry-run launch plan by default
  - install mutation belongs to Universal Setup
  - cross-product orchestration belongs to Universal Launcher
local_state:
  root: .aide.local/
  committed: false
notes: >
  This profile records target-specific launcher truth after safe AIDE Lite Pack
  import. The launcher may use AIDE for context, validation, review packets,
  and advisory structure analysis, but product packages must not depend on
  AIDE or Python.
