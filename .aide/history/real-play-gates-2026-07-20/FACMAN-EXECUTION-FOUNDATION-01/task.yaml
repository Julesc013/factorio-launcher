id: FACMAN-EXECUTION-FOUNDATION-01
title: FacMan safe execution foundation
status: passed
lifecycle_state: archived
planning_state: closed
created_at: 2026-07-19T15:27:03Z
owner: unassigned
objective: >
  A Factorio-shaped process can be started, monitored, cancelled, killed, recovered, and audited under an authorised instance without escaping its roots or leaving a false running state; real Factorio execution remains unpromoted.
allowed_paths:
  - runtime/**
  - apps/**
  - content/**
  - include/**
  - contracts/**
  - tests/**
  - tools/**
  - docs/**
  - release/**
  - CMakeLists.txt
  - README.md
  - .aide/**
forbidden_paths:
  - .git/**
  - .aide.local/**
supported_scope:
  - immutable application startup configuration
  - global effect and capability admission for the public command boundary
  - one Launch application module with fallback routing for untouched domains
  - product-neutral process supervision consumed by CLI transport and Factorio launch
  - versioned fake-process launch-session lifecycle, audit, and recovery
declared_effects:
  - repository workspace reads and writes
  - test-only local process execution under disposable temporary roots
  - no real Factorio, network, credential, setup mutation, signing, or publication authority
failure_behaviour:
  - refuse public Play until a separate real-play gate passes
  - kill the complete supervised process tree on cancellation, timeout, or output exhaustion
  - record recovery_required rather than leaving or inferring a false running or successful state
user_visible_criterion:
  - facman play is the preferred spelling and returns the same safe typed refusal as the compatibility alias until authority is promoted
automated_evidence:
  - fake-process success, non-zero exit, hang, cancellation, excessive output, ignored graceful termination, child process, crash, controlled roots, and interrupted-journal recovery
  - canonical fast and full developer entrypoints plus contract, architecture, CLI, package, and AIDE validation
human_evidence:
  - none; this WorkUnit explicitly cannot promote a real execution guarantee
explicit_exclusions:
  - real Factorio execution and real protected-root claims
  - Steam state manipulation or standalone licence acquisition
  - repository reorganisation, full domain migration, plugins, daemon, AI, signing, and publication
architecture_budget:
  - one immutable configuration model
  - one effect/capability admission seam
  - one process-supervision port and platform mechanism
  - one Launch module, one versioned execution result, and one run-session journal
