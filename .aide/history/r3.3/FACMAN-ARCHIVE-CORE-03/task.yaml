schema_version: aide.queue-task.v0
id: FACMAN-ARCHIVE-CORE-03
title: Build the production archive core
status: passed
planning_state: closed
created_at: 2026-07-11
owner: Codex
objective: >
  Create one Factorio-neutral production ZIP layer over the admitted Miniz
  source pin, with independent metadata agreement checks, fail-closed entry
  policy and budgets, streaming reads and staged verified writes.
depends_on:
  - FACMAN-ARCHIVE-DEPENDENCY-ADMISSION-01
allowed_paths:
  - .github/workflows/ci.yml
  - .aide/queue/**
  - .aide/context/**
  - .aide/profile.yaml
  - CMakeLists.txt
  - runtime/archive/**
  - tests/archive_corpus/**
  - tests/native/fl_archive_*.cpp
  - tests/test_archive_core.py
  - tests/test_source_format_check.py
  - tools/archive_corpus.py
  - tools/archive_core_check.py
  - tools/source_format_check.py
  - tools/strict_check.py
  - tools/structure_policy_check.py
forbidden_paths:
  - apps/**
  - runtime/factorio/**
  - include/**
  - contracts/**
  - release/**
  - external/**
  - .git/**
  - .env
  - secrets/**
acceptance:
  - Stored, deflate, ZIP64, descriptors, CRC, central/local agreement, streaming, and truncation behavior are proven.
  - Multi-disk, encryption, malformed extras, overlap, unsupported file types, and links refuse before extraction.
  - Archive paths reject traversal, platform-qualified forms, ADS, reserved names, invalid segments, and declared collisions.
  - Entry, size, ratio, depth, path, total-expanded, archive-size, and elapsed-time budgets are configurable and fail closed.
  - Writer output is deterministic when requested, staged, self-verified, and never directly overwrites a final target.
  - Malicious corpus, property/mutation tests, metadata-planning fuzz targets, and Linux sanitizer integration are present.
  - Existing CLI archive consumers remain unchanged until later parity WorkUnits.
non_goals:
  - no consumer migration
  - no direct final-target writer
  - no hand-written compression
  - no extraction outside owned staging
  - no second dependency
  - no capability promotion
lifecycle_state: archived
archived_at: 2026-07-11T22:46:37Z
