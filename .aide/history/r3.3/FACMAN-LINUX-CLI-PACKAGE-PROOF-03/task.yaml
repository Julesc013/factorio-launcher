acceptance:
  - The profile identity is linux_portable_cli_x64 and claims only Linux x64 CLI portability on the declared runner/toolchain.
  - Payload contains facman, required runtime content, compatibility contracts, manifests, licenses, and minimal documentation only.
  - Compiler, linker, libc baseline, architecture, sibling SHAs, target, and project linkage are recorded.
  - Dynamic dependencies and RPATH/RUNPATH are inspected and enforced by allowlist.
  - Runtime proof covers spaces, Unicode, renamed extraction root, arbitrary cwd, read-only package root, external workspace, and empty PATH.
  - Integrity proof rejects missing, modified, extra, wrong-target, wrong-architecture, linked, and incomplete payloads.
  - Archive extraction and post-extraction smoke pass with zero required skips.
  - ASan/UBSan native/archive tests remain separate from the release-shaped package.
non_goals:
  - no universal Unix or all-distributions claim
  - no completely static binary claim without system-library proof
  - no TUI, daemon, GTK, Qt, or shared project libraries
  - no run.execute or real Factorio execution
  - no signing, tag, release, publication, or setup mutation
