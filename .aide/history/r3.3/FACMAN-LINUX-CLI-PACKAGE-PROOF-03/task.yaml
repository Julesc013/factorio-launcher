title: Prove the target-specific Linux x64 CLI package
status: active
planning_state: implementation
created_at: 2026-07-12
owner: Codex
objective: >
  Add one explicit linux_portable_cli_x64 package profile containing only the
  functional CLI and required runtime/contract/license payload. Prove target,
  linkage, dependency allowlist, integrity closure, extraction, relocation,
  read-only-root, external-workspace, arbitrary-cwd, Unicode/space, and
  empty-PATH behavior on the declared Linux runner with zero required skips.
