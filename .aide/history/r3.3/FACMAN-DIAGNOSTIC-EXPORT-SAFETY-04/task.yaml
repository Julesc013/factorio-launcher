acceptance:
  - Every selected file is read from one no-follow stable handle with identity, metadata, link-count, and byte-budget checks before and after reading.
  - Only reviewed JSON, INI/config, FacMan manifest, Factorio log, and explicit diagnostic text formats are collected.
  - Unknown formats are omitted with a structured reason and malformed sensitive formats fail closed.
  - The typed manifest records traversal, redaction, read consistency, omissions, source identity, and policy version without raw credential or private path leakage.
  - Bundle creation uses the production archive writer, no-clobber staging, the bounded transaction journal, and post-write self-verification.
  - diagnostics.export and doctor --diagnostic-bundle are enabled only when the complete adversarial gate passes.
  - No selected file can race, link, or alias an external sensitive source.
non_goals:
  - no arbitrary-format sanitizer
  - no unreviewed raw file copying
  - no run.execute or real Factorio execution
  - no setup mutation, networking, credentials, signing, release, or publication
