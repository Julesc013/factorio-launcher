schema: flaunch.aide.root_authority.v1
project: factorio-launcher
roots:
  include:
    authority: public_c_abi
    canonical: true
    allowed:
      - public_c_headers
    forbidden:
      - private_headers
      - implementation
      - generated_reports
      - product_templates
  source:
    authority: private_implementation_and_app_source
    canonical: true
    allowed:
      - private_c
      - private_cpp
      - app_implementation
      - product_binding_implementation
      - prototype_harness
    forbidden:
      - public_abi_headers
      - platform_package_shells
      - generated_reports
      - user_workspace_state
    notes:
      - only implementation source root
      - no nested src or source roots
  apps:
    authority: frontend_package_shells
    canonical: true
    allowed:
      - project_files
      - frontend_shell_metadata
      - build_integration_files
    forbidden:
      - core_product_logic
      - install_mutation_logic
      - mod_resolution
      - launch_plan_generation
  data:
    authority: factorio_product_templates_policy_and_rules
    canonical: true
    allowed:
      - product_manifest
      - discovery_rules
      - launch_templates
      - instance_templates
      - policy
    forbidden:
      - executable_code
      - credentials
      - factorio_binaries
  schemas:
    authority: versioned_compatibility_contracts
    canonical: true
    allowed:
      - json_schema
    forbidden:
      - implementation_logic
      - unversioned_contracts
  packaging:
    authority: platform_package_manifests
    canonical: true
    allowed:
      - package_manifests
      - extraction_policies
      - component_lists
    forbidden:
      - build_outputs
      - installed_state
      - bundled_factorio_binaries
  docs:
    authority: explanatory_documentation
    canonical: false
    allowed:
      - architecture_docs
      - product_docs
      - platform_docs
      - roadmap
      - reference_docs
    forbidden:
      - executable_truth
      - credentials
  tests:
    authority: verification
    canonical: true
    allowed:
      - unit_tests
      - integration_tests
      - fixtures
      - golden_behavior_tests
    forbidden:
      - production_runtime_logic
  tools:
    authority: repo_automation
    canonical: true
    allowed:
      - validators
      - package_checks
      - security_checks
    forbidden:
      - product_runtime_logic
      - frontend_business_logic
  .aide:
    authority: repo_local_development_governance
    canonical: false
    allowed:
      - portable_aide_lite_framework
      - target_profile
      - target_memory
      - target_policies
      - report_only_context_tools
    forbidden:
      - product_runtime_dependency
      - credentials
      - raw_prompts
      - raw_responses
      - provider_state
