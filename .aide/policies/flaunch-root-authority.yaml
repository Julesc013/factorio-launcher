schema: flaunch.aide.root_authority.v1
project: factorio-launcher
roots:
  include:
    authority: public_c_abi
    canonical: true
    allowed: [public_c_headers]
    forbidden: [private_headers, implementation, generated_reports]
  runtime:
    authority: private_compiled_implementation
    canonical: true
    allowed: [base_runtime, clients, factorio_binding, package_runtime, platform_runtime]
    forbidden: [public_abi_headers, frontend_shells, setup_mutation]
  apps:
    authority: frontend_shells
    canonical: true
    allowed: [cli, tui, daemon, gui_shells]
    forbidden: [core_product_logic, install_mutation_logic, launch_plan_generation]
  content:
    authority: declarative_factorio_product_content
    canonical: true
    allowed: [templates, product_data, policy, strings, themes]
    forbidden: [executable_code, credentials, factorio_binaries]
  contracts:
    authority: versioned_compatibility_law
    canonical: true
    allowed: [abi, command, result, refusal, diagnostic, policy, schema]
    forbidden: [implementation_logic, unversioned_contracts]
  release:
    authority: packaging_and_release_definitions
    canonical: true
    allowed: [indexes, packaging_recipes, release_profiles]
    forbidden: [build_outputs, installed_state, bundled_factorio_binaries]
  docs:
    authority: explanatory_documentation
    canonical: false
    allowed: [architecture_docs, product_docs, platform_docs, roadmap, release_docs]
    forbidden: [executable_truth, credentials]
  tests:
    authority: verification
    canonical: true
    allowed: [unit_tests, integration_tests, fixtures, goldens, adversarial_tests]
    forbidden: [production_runtime_logic]
  tools:
    authority: repository_automation
    canonical: true
    allowed: [validators, package_tools, security_checks, release_tools]
    forbidden: [product_runtime_logic, frontend_business_logic]
  cmake:
    authority: build_policy
    canonical: true
    allowed: [compiler_policy, platform_policy, toolchain_rules]
    forbidden: [product_semantics]
  external:
    authority: pinned_third_party_dependencies
    canonical: true
    allowed: [vendored_dependencies, dependency_notices]
    forbidden: [unreviewed_binaries, credentials]
  LICENSES:
    authority: license_texts
    canonical: true
    allowed: [reuse_license_texts, packaged_dependency_notices]
    forbidden: [invented_provider_licenses]
  examples:
    authority: non_authoritative_examples
    canonical: false
    allowed: [profiles, server_examples]
    forbidden: [runtime_defaults, compatibility_law]
  archive:
    authority: quarantined_history
    canonical: false
    allowed: [retained_history]
    forbidden: [active_runtime, active_contracts, release_inputs]
  .aide:
    authority: repository_local_development_governance
    canonical: false
    allowed: [portable_aide_lite, target_profile, target_memory, target_policies]
    forbidden: [product_runtime_dependency, credentials, raw_prompts, raw_responses]
