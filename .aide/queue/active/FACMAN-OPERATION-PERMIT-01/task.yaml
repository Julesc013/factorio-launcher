architecture_invariants:
  - frontends depend on runtime/client, not backend implementations
  - AIDE remains development-only and is excluded from product packages
  - focused validation does not replace the full promotion matrix
  - human acceptance remains an operator verdict
  - readiness and plans never grant authority by themselves
  - each permit binds one operation kind and an exact closed resource set
  - permit identity binds current evidence, plan, policy, providers, principal, nonce, and expiry
  - providers independently revalidate permit scope and current resource identity
  - a menu permit cannot authorize another launch intent or preparation operation
  - expired, replayed, stale, wrong-machine, wrong-provider, and wrong-resource permits fail closed
  - harmless read-only inspection does not require a permit
  - global admission is not the sole policy enforcer
  - product permit issuance and real Factorio execution remain unavailable until separately reviewed
