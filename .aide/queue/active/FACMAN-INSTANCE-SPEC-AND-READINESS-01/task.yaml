architecture_invariants:
  - frontends depend on runtime/client, not backend implementations
  - AIDE remains development-only and is excluded from product packages
  - focused validation does not replace the full promotion matrix
  - human acceptance remains an operator verdict
  - Instance is the primary selectable and playable aggregate
  - saves and worlds are optional content inside an instance
  - InstanceSpec contains portable logical intent and no machine path or secret values
  - InstanceBinding contains machine-local resolution and evidence identities
  - InstanceReadiness is a computed read-only projection and never grants authority
  - menu is the explicit default LaunchIntent and no save is inferred
  - existing instance.list and instances.inspect contracts remain compatible
  - the initial player projection adds instances.describe and instances.readiness only
  - preparation, permit issuance, and real Factorio execution remain unavailable
