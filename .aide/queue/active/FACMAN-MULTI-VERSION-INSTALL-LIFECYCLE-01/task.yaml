objective: >
  A player can discover, inspect, register, preserve, plan, install or adopt, verify, repair, move, reconfigure, reinstall, update, and uninstall explicitly selected non-Steam Factorio versions under a custom versioned library without overwriting sibling versions or conflating program files with player data.
