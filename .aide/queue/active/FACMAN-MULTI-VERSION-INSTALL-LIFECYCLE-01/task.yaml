architecture_invariants:
  - frontends depend on runtime/client, not backend implementations
  - AIDE remains development-only and is excluded from product packages
  - focused validation does not replace the full promotion matrix
  - human acceptance remains an operator verdict
  - official Factorio installer registration is never copied or fabricated
  - foreign installations remain read-only unless separately adopted through Universal Setup
  - instance data import is additive, bounded, no-follow, staged, and leaves the source unchanged
  - setup owns managed program-tree mutation while FacMan owns Factorio instance-data semantics
  - install source, deployment, authority, data, integration, health, provenance, and filesystem evidence remain independent
  - reconciliation planning never grants apply authority or rewrites a compatible v1 install record
allowed_effects:
  - read explicitly selected local Factorio installation roots and archive sources
  - register read-only foreign install references in the FacMan workspace
  - create FacMan-owned staged instance data from an explicitly selected registered install
  - plan managed installs through Universal Setup
  - execute the exact locally supplied Wube-signed 2.0.77 installer against D:/Games/Factorio/2.0 after a same-volume rollback move
  - snapshot and restore only HKLM/Software/Microsoft/Windows/CurrentVersion/Uninstall/Factorio Space Age_is1 so 2.1 remains the primary Windows registration
forbidden_effects:
  - mutate Steam, Steam Cloud, or the default Factorio AppData root
  - execute any installer other than the exact inspected Wube-signed 2.0.77 source
  - fabricate or clone Add/Remove Programs registration; only exact 2.1 key restoration is allowed
  - overwrite an existing installation or instance target
  - follow links or reparse points during discovery or data import
  - use network, credentials, registry writes outside the exact Factorio Space Age rollback key, signing, or publication
acceptance:
  - scanning D:/Games/Factorio returns each numeric version root exactly once and no invalid parent
  - the original 2.0.77 tree is classified as portable with install-local player data while official installer trees disclose shared-data and registration risk
  - every selected local version can be registered without changing its install tree
  - local player data can be preserved into a new isolated instance through a staged no-clobber import
  - the inspected Wube-signed 2.0.77 split installer is applied only to D:/Games/Factorio/2.0 after retaining an exact same-volume rollback tree
  - the exact 2.1 uninstall key is restored after install so the existing 2.1 tree remains the primary Windows registration
  - every registered install can be projected into installation model v2 without rewriting the workspace
  - desired-state reconciliation is deterministic, plan-only, source-preserving, and defaults missing authority to read-only
