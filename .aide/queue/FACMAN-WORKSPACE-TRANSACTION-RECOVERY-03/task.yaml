schema_version: aide.queue-task.v0
id: FACMAN-WORKSPACE-TRANSACTION-RECOVERY-03
title: Add bounded workspace transaction recovery
status: needs_review
planning_state: implementation_completed
created_at: 2026-07-11
owner: Codex
objective: >
  Introduce one bounded, durable operation journal for currently enabled
  multi-file writers and canonical read-only inspect/plan plus explicit-ID
  recovery apply commands. Recovery may act only on recognized owned staging
  paths and must preserve complete committed targets.
depends_on:
  - FACMAN-SAVE-AND-INSTANCE-TRANSFER-ROUTE-03
allowed_paths:
  - .aide/profile.yaml
  - .aide/memory/project-state.md
  - .aide/queue/**
  - .aide/context/**
  - CMakeLists.txt
  - apps/cli/command_dispatch.cpp
  - runtime/archive/**
  - runtime/base/**
  - runtime/factorio/application/**
  - runtime/factorio/binding/flb_api.c
  - runtime/factorio/modsets/**
  - runtime/factorio/saves/**
  - runtime/transaction/**
  - contracts/command/**
  - contracts/refusal/**
  - contracts/result/**
  - contracts/schema/**
  - docs/architecture/**
  - docs/quality/**
  - tests/golden/commands/**
  - tests/native/flb_command_bridge_smoke.c
  - tests/test_cli.py
  - tests/test_recovery.py
  - tests/test_save_transfer.py
  - tools/command_contract_check.py
  - tools/frontend_contract_check.py
  - tools/frontend_parity_check.py
  - tools/refusal_contract_check.py
  - tools/refusal_golden_check.py
  - tools/schema_validate.py
  - tools/strict_check.py
  - tools/structure_policy_check.py
  - tools/transaction_recovery_check.py
forbidden_paths:
  - runtime/factorio/diagnostics/**
  - runtime/factorio/launch/**
  - include/**
  - release/**
  - external/**
  - .github/**
  - .git/**
  - .env
  - secrets/**
acceptance:
  - Journals use the declared requested-through-complete and failure state model.
  - Records contain schema, transaction and command identity, targets, sources, timestamps, steps, staging roots, expected hashes, strategy, error, and recovery actions.
  - workspace.recovery.inspect and workspace.recovery.plan are read-only canonical commands.
  - workspace.recovery.apply requires one explicit transaction ID and is idempotent.
  - Recovery removes only recognized owned staging paths and never deletes a committed target because a journal is incomplete.
  - Unknown versions, corrupted journals, substituted or missing staging, read-only workspaces, and concurrent recovery refuse safely.
  - Doctor reports incomplete transactions without mutating them.
  - Fault injection covers every state transition and repeated recovery.
  - Platform durability boundaries are explicit and tested where supported.
non_goals:
  - no speculative universal transaction framework
  - no shared-filesystem safety claim
  - no diagnostic export
  - no run.execute or real Factorio execution
  - no setup mutation, networking, signing, release, or publication
