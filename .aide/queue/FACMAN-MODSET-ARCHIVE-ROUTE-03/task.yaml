schema_version: aide.queue-task.v0
id: FACMAN-MODSET-ARCHIVE-ROUTE-03
title: Route local mod and modset archives authoritatively
status: active
planning_state: implementation
created_at: 2026-07-11
owner: Codex
objective: >
  Migrate mods.import, modsets.lock, modsets.verify, and modsets.export from CLI
  backend behavior to canonical ULK descriptors, registered FLB handlers,
  typed Factorio application operations, and the production archive core.
depends_on:
  - FACMAN-ARCHIVE-CORE-03
allowed_paths:
  - .aide/queue/**
  - .aide/context/**
  - .aide/profile.yaml
  - CMakeLists.txt
  - apps/cli/command_dispatch.cpp
  - runtime/archive/**
  - runtime/factorio/application/**
  - runtime/factorio/binding/flb_api.c
  - runtime/factorio/mods/**
  - runtime/factorio/modsets/**
  - contracts/command/**
  - contracts/result/**
  - contracts/refusal/**
  - contracts/schema/factorio/**
  - docs/architecture/**
  - docs/quality/**
  - tests/fixtures/factorio_mods/**
  - tests/golden/modsets/**
  - tests/native/flb_command_bridge_smoke.c
  - tests/test_archive_core.py
  - tests/test_cli.py
  - tests/test_modzip_depth.py
  - tests/test_native_command_bridge.py
  - tests/test_schema_tools.py
  - tools/alpha_vertical_slice_check.py
  - tools/archive_core_check.py
  - tools/command_contract_check.py
  - tools/frontend_contract_check.py
  - tools/frontend_parity_check.py
  - tools/refusal_contract_check.py
  - tools/refusal_golden_check.py
  - tools/schema_validate.py
  - tools/strict_check.py
forbidden_paths:
  - runtime/factorio/saves/**
  - runtime/factorio/diagnostics/**
  - runtime/factorio/launch/**
  - include/**
  - release/**
  - external/**
  - .github/**
  - .git/**
  - .env
  - secrets/**
acceptance:
  - All four canonical command IDs are registered with truthful schemas, effects, availability, and dry-run behavior.
  - CLI parsing normalizes aliases and performs no backend mod or modset behavior.
  - Compressed info.json metadata is streamed through the production archive core before any copy.
  - Import preserves the source, uses owned staging and no-clobber commit, and retains hashes and compatibility metadata.
  - Lock and verify reject missing, hash-drifted, metadata-drifted, duplicate, incompatible, unsupported, and unsafe archives.
  - Export uses the production staged writer and self-verifies before no-clobber commit.
  - Live dispatch, command graph, effects, schemas, JSON, and human renderer parity pass.
  - Migrated stored-only helpers and CLI backend logic are removed and mechanically forbidden.
non_goals:
  - no Mod Portal networking
  - no account tokens
  - no remote resolution or download
  - no save or instance transfer migration
  - no transaction framework beyond the bounded staging required here
  - no capability outside the four canonical commands
