schema_version: aide.queue-task.v0
id: FACMAN-LOCAL-FILESYSTEM-LOCK-HARDEN-03
title: Harden local-filesystem operation locks
status: active
planning_state: implementation
created_at: 2026-07-12
owner: Codex
objective: >
  Hold a stable platform handle for the full run-lock and recovery-lock
  operation, record file identity, revalidate it before release, refuse links
  and hostile substitution, and conservatively refuse unsupported shared or
  network filesystems without claiming multi-host guarantees.
depends_on:
  - FACMAN-R3.3-PROOF-CLOSEOUT-01
allowed_paths:
  - .aide/profile.yaml
  - .aide/memory/project-state.md
  - .aide/queue/**
  - .aide/context/**
  - CMakeLists.txt
  - runtime/base/**
  - runtime/factorio/launch/**
  - runtime/transaction/**
  - tests/native/**
  - tests/test_instance_isolation_probe.py
  - tests/test_recovery.py
  - tests/test_source_format_check.py
  - tools/strict_check.py
  - tools/structure_policy_check.py
  - tools/*lock*check.py
  - docs/architecture/**
  - docs/quality/**
  - docs/roadmap.md
forbidden_paths:
  - include/**
  - external/**
  - .github/workflows/**
  - release/**
  - .git/**
acceptance:
  - The lock handle remains open and exclusively locked for the operation lifetime.
  - Lock identity records Windows volume/file ID or POSIX device/inode and is revalidated before release.
  - Linked, substituted, missing, or identity-drifted lock paths refuse without deleting an attacker-controlled path.
  - Unsupported network or shared filesystems refuse conservatively.
  - Lock-holder death, stale metadata, hostile replacement, renamed parents, junctions or symlinks, and concurrent recovery are tested.
  - Existing run-lock and recovery-lock behavior remains typed, bounded, and cross-platform.
non_goals:
  - no SMB, NFS, network share, or multi-host safety promotion
  - no run.execute or real Factorio execution
  - no speculative distributed lock service
  - no setup mutation, networking, signing, release, or publication
