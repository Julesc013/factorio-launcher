architecture_invariants:
  - frontends depend on runtime/client, not backend implementations
  - AIDE remains development-only and is excluded from product packages
  - focused validation does not replace the full promotion matrix
  - human acceptance remains an operator verdict
  - Universal Setup owns application-tree mutation and independently validates permits
  - a source candidate is never treated as authenticated source evidence
  - foreign installation roots remain read-only unless explicitly and safely adopted
  - in-place foreign-to-managed conversion remains refused
  - original source and foreign roots are never silently deleted
  - every mutation is transaction-backed, verified, and recovery-aware
