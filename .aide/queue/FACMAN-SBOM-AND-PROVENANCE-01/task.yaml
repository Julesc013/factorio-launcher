schema_version: aide.queue-task.v0
id: FACMAN-SBOM-AND-PROVENANCE-01
title: Generate unsigned SBOM and build provenance
status: active
planning_state: implementation
created_at: 2026-07-12
owner: Codex
objective: >
  Generate a package-scoped SPDX SBOM and external unsigned provenance record
  that binds dependencies/licenses, toolchain, exact source revisions,
  workspace lock, component/hash manifests, artifact digest, CI identity, and
  source-derived timestamp policy while keeping publisher authenticity false.
depends_on:
  - FACMAN-LOCAL-FILESYSTEM-LOCK-HARDEN-03
allowed_paths:
  - .aide/profile.yaml
  - .aide/memory/project-state.md
  - .aide/queue/**
  - .aide/context/**
  - .github/workflows/ci.yml
  - contracts/schema/release/**
  - docs/architecture/**
  - docs/quality/**
  - docs/roadmap.md
  - release/index/**
  - tests/test_package_*.py
  - tests/package_runtime/**
  - tools/package_*.py
  - tools/provenance_*.py
  - tools/strict_check.py
  - tools/structure_policy_check.py
  - tools/validators/release/**
forbidden_paths:
  - apps/**
  - runtime/**
  - include/**
  - external/**
  - .github/workflows/release.yml
  - .git/**
acceptance:
  - Every selected built package contains a schema-valid SPDX 2.3 SBOM.
  - External provenance binds the artifact digest to source revisions, workspace lock, component and hash manifests, SBOM, toolchain, and CI identity.
  - The build timestamp uses a documented source-commit UTC policy rather than wall-clock nondeterminism.
  - Linux target CI uploads the provenance beside the unsigned artifact and package evidence.
  - Integrity and provenance-recorded claims remain distinct from publisher authenticity.
  - Mutation tests reject drifted artifact, component manifest, workspace lock, source identity, or CI identity.
non_goals:
  - no signature, attestation service, transparency log, or publisher authenticity
  - no tag, release, publication, setup mutation, networking, or credentials
  - no second dependency
  - no real Factorio execution or run.execute
