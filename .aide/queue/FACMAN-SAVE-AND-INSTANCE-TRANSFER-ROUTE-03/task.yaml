acceptance:
  - All five canonical command IDs have truthful registered descriptors and typed application routes.
  - Production compressed saves are structurally inspected without claiming deep Factorio semantics.
  - Backup and clone verify opened-source identity and hashes and commit staged no-clobber output plus sidecars safely.
  - Instance export has a typed manifest, deterministic hash closure, portable redaction, production writer, and self-verification.
  - Instance import fully plans and verifies before owned staging, staged-tree verification, and atomic final commit.
  - Cross-volume output uses an explicit copy, verify, and commit strategy.
  - CLI aliases normalize to canonical IDs and retain no migrated backend behavior.
  - Interruption and stage failures leave no destination or a recognized recoverable transaction.
non_goals:
  - no general transaction journal beyond bounded operation evidence needed by this WorkUnit
  - no diagnostic export
  - no run.execute or real Factorio execution
  - no setup mutation, networking, credentials, signing, release, or publication
