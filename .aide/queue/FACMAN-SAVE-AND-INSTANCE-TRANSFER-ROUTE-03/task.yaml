schema_version: aide.queue-task.v0
id: FACMAN-SAVE-AND-INSTANCE-TRANSFER-ROUTE-03
title: Route saves and portable instance transfer authoritatively
status: active
planning_state: implementation
created_at: 2026-07-11
owner: Codex
objective: >
  Migrate saves.list, saves.backup, saves.clone, instance.export, and
  instance.import from CLI backend behavior to canonical ULK descriptors,
  registered FLB handlers, typed Factorio application operations, and the
  production archive core with verified owned staging and no-clobber commits.
depends_on:
  - FACMAN-MODSET-ARCHIVE-ROUTE-03
