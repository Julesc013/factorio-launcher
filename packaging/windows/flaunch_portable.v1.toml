schema = "flaunch.packaging.bundle_manifest.v1"
artifact_id = "FLaunch-<version>-windows-x64-portable"
platform = "windows"
support_level = "primary"
package_type = "portable_zip"
architecture = "x64"
python_runtime = false
bundles_factorio_binaries = false
entrypoint = "FLaunch.exe"

[[components]]
name = "winforms_gui"
source_target = "source/apps/winforms"
destination = "FLaunch.exe"
required_platform = "windows"
architecture = "x64"
hash = "BUILD_TIME"
signature_policy = "authenticode_optional"
extraction_policy = "none"
runtime_search_path = "."
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "console_cli"
source_target = "flaunch_cli"
destination = "flaunch.exe"
required_platform = "windows"
architecture = "x64"
hash = "BUILD_TIME"
signature_policy = "authenticode_optional"
extraction_policy = "none"
runtime_search_path = "."
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "console_tui"
source_target = "flaunch_tui"
destination = "flaunch-tui.exe"
required_platform = "windows"
architecture = "x64"
hash = "BUILD_TIME"
signature_policy = "authenticode_optional"
extraction_policy = "none"
runtime_search_path = "."
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
