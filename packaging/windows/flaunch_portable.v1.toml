required_platform = "windows"
architecture = "x64"
hash = "BUILD_TIME"
signature_policy = "authenticode_optional"
extraction_policy = "none"
runtime_search_path = "."
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "ulk_shared"
source_target = "ulk_shared"
destination = "bin/ulk.dll"
required_platform = "windows"
architecture = "x64"
hash = "BUILD_TIME"
signature_policy = "authenticode_optional"
