schema = "flaunch.packaging.bundle_manifest.v1"
artifact_id = "FLaunch-<version>-macos-app"
platform = "macos"
support_level = "base"
package_type = "app_bundle"
architecture = "configured_by_track"
python_runtime = false
bundles_factorio_binaries = false
entrypoint = "FLaunch.app/Contents/MacOS/FLaunch"

[[components]]
name = "appkit_gui"
source_target = "source/apps/appkit"
destination = "FLaunch.app/Contents/MacOS/FLaunch"
required_platform = "macos"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "@executable_path"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "cli"
source_target = "flaunch_cli"
destination = "FLaunch.app/Contents/MacOS/flaunch"
required_platform = "macos"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "@executable_path"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "daemon"
source_target = "flaunch_daemon"
destination = "FLaunch.app/Contents/MacOS/flaunchd"
required_platform = "macos"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "@executable_path"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "ulk_shared"
source_target = "ulk_shared"
destination = "FLaunch.app/Contents/Frameworks/libulk.dylib"
required_platform = "macos"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "@executable_path/../Frameworks"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "usk_shared"
source_target = "usk_shared"
destination = "FLaunch.app/Contents/Frameworks/libusk.dylib"
required_platform = "macos"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "@executable_path/../Frameworks"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "flb_factorio_shared"
source_target = "flb_factorio_shared"
destination = "FLaunch.app/Contents/Frameworks/libflb_factorio.dylib"
required_platform = "macos"
architecture = "configured_by_track"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "@executable_path/../Frameworks"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "schemas"
source_target = "schemas"
destination = "FLaunch.app/Contents/Resources/schemas/"
required_platform = "all"
architecture = "any"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "Contents/Resources/schemas"
license_notice = "THIRD_PARTY_NOTICES.md"

[[components]]
name = "factorio_data"
source_target = "data/factorio"
destination = "FLaunch.app/Contents/Resources/data/factorio/"
required_platform = "all"
architecture = "any"
hash = "BUILD_TIME"
signature_policy = "codesign_required"
extraction_policy = "none"
runtime_search_path = "Contents/Resources/data/factorio"
license_notice = "THIRD_PARTY_NOTICES.md"
