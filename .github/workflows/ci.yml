name: ci

on:
  push:
  pull_request:

jobs:
  linux-native:
    runs-on: ubuntu-24.04
    env:
      FACMAN_CLI_EXE: ${{ github.workspace }}/build/native-smoke/facman
      FACMAN_TUI_EXE: ${{ github.workspace }}/build/native-smoke/facman-tui
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install locked development validators
        run: python -m pip install -r tools/requirements-dev.lock
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Configure native core
        run: >-
          cmake -S . -B build/native-smoke
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DFACMAN_BUILD_CLI=ON
          -DFACMAN_BUILD_TUI=ON
          -DFACMAN_WARNINGS_AS_ERRORS=ON
      - name: Build native core
        run: cmake --build build/native-smoke
      - name: Run native tests
        run: ctest --test-dir build/native-smoke --output-on-failure
      - name: Configure Linux Release core
        run: >-
          cmake -S . -B build/native-release
          -DCMAKE_BUILD_TYPE=Release
          -DFACMAN_BUILD_CLI=ON
          -DFACMAN_BUILD_TUI=ON
          -DFACMAN_WARNINGS_AS_ERRORS=ON
      - name: Build and test Linux Release
        run: |
          cmake --build build/native-release --parallel
          ctest --test-dir build/native-release --output-on-failure
      - name: Run clang-tidy on changed first-party modules
        run: python tools/clang_tidy_changed.py --base HEAD^ --build-root build/native-smoke
      - name: Configure sanitized full-core proof
        run: >-
          cmake -S . -B build/core-sanitized
          -DCMAKE_BUILD_TYPE=Debug
          -DFACMAN_BUILD_CLI=ON
          -DFACMAN_ENABLE_SANITIZERS=ON
          -DFACMAN_WARNINGS_AS_ERRORS=ON
      - name: Build sanitized full core
        run: cmake --build build/core-sanitized --parallel
      - name: Run sanitized full CTest suite and archive corpus
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          FACMAN_FL_ARCHIVE_PROBE_EXE: ${{ github.workspace }}/build/core-sanitized/fl_archive_probe
          FACMAN_FL_ARCHIVE_METADATA_FUZZ_EXE: ${{ github.workspace }}/build/core-sanitized/fl_archive_metadata_fuzz
          FACMAN_FL_ARCHIVE_PLAN_FUZZ_EXE: ${{ github.workspace }}/build/core-sanitized/fl_archive_plan_fuzz
        run: |
          ctest --test-dir build/core-sanitized --output-on-failure
          python -m unittest tests.test_archive_core -v
          find tests/fixtures/compatibility tests/golden -name '*.json' -print0 | xargs -0 ./build/core-sanitized/fl_json_fuzz
      - name: Configure real bounded libFuzzer job
        run: >-
          cmake -S . -B build/libfuzzer
          -DCMAKE_BUILD_TYPE=Debug
          -DFACMAN_BUILD_CLI=OFF
          -DFACMAN_ENABLE_LIBFUZZER=ON
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
      - name: Run bounded libFuzzer job
        run: |
          cmake --build build/libfuzzer --target fl_archive_libfuzzer fl_json_libfuzzer --parallel
          ./build/libfuzzer/fl_archive_libfuzzer -runs=1000 tests/fixtures/factorio_saves tests/fixtures/factorio_mods
          ./build/libfuzzer/fl_json_libfuzzer -runs=1000 tests/fixtures/compatibility tests/golden
      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v
      - name: Run strict policy checks
        run: python tools/strict_check.py
      - name: Native CLI smoke
        run: |
          ./build/native-smoke/facman --version
          ./build/native-smoke/facman product inspect
          ./build/native-smoke/facman doctor
          ./build/native-smoke/facman-tui --list --json
          ./build/native-smoke/facman-tui --command workspace.status --json
      - name: Build enabled portable CLI compatibility profile
        run: python tools/package_build.py --profile portable_cli_x64 --out build/packages --build-root build/native-smoke
      - name: Smoke portable CLI compatibility profile
        run: python tools/package_runtime_smoke.py --root build/packages/portable_cli_x64
      - name: Build and smoke Linux x64 TUI preview package
        run: |
          python tools/package_build.py --profile linux_portable_tui_x64 --out build/tui-packages --build-root build/native-smoke --dist build/tui-dist
          python tools/package_runtime_smoke.py --root build/tui-packages/linux_portable_tui_x64
      - name: Run required Linux x64 CLI package proof with zero skips
        run: >-
          python tools/linux_package_proof.py
          --build-root build/native-smoke
          --out build/linux-package-proof/packages
          --dist build/linux-package-proof/dist
          --evidence build/linux-package-proof/evidence.v1.json
      - name: Preserve unsigned Linux package proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable-cli-x64-${{ github.sha }}
          path: |
            build/linux-package-proof/dist/*.tar.gz
            build/linux-package-proof/dist/*.provenance.v1.json
            build/linux-package-proof/evidence.v1.json
            build/tui-dist/*linux-tui-x64-portable.tar.gz
          if-no-files-found: error
          retention-days: 14

  linux-coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install coverage tooling
        run: python -m pip install gcovr==8.6
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Configure coverage core
        run: >-
          cmake -S . -B build/coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DFACMAN_BUILD_CLI=ON
          -DFACMAN_ENABLE_COVERAGE=ON
      - name: Build and execute coverage tests
        run: |
          cmake --build build/coverage --parallel
          ctest --test-dir build/coverage --output-on-failure
      - name: Generate and enforce critical-module coverage evidence
        run: |
          gcovr --root . --filter 'runtime/(archive|base|transaction|workspace)/' --json-pretty --output build/coverage/critical-coverage.json
          python tools/coverage_policy_check.py --report build/coverage/critical-coverage.json
      - name: Preserve coverage evidence
        uses: actions/upload-artifact@v4
        with:
          name: critical-coverage-${{ github.sha }}
          path: build/coverage/critical-coverage.json
          if-no-files-found: error
          retention-days: 14

  windows-native-package:
    runs-on: windows-2022
    env:
      FACMAN_CLI_EXE: ${{ github.workspace }}\build\native-smoke\Debug\facman.exe
      FACMAN_TUI_EXE: ${{ github.workspace }}\build\native-smoke\Debug\facman-tui.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install locked development validators
        run: python -m pip install -r tools/requirements-dev.lock
      - uses: microsoft/setup-msbuild@v3
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Configure Windows native core
        run: cmake -S . -B build/native-smoke -DFACMAN_BUILD_CLI=ON -DFACMAN_BUILD_TUI=ON -DFACMAN_WARNINGS_AS_ERRORS=ON
      - name: Build Windows native core
        run: cmake --build build/native-smoke --config Debug
      - name: Run Windows native tests
        run: ctest --test-dir build/native-smoke -C Debug --output-on-failure
      - name: Build and test Windows Release
        run: |
          cmake --build build/native-smoke --config Release --parallel
          ctest --test-dir build/native-smoke -C Release --output-on-failure
      - name: Build WinForms shell
        run: msbuild apps\gui\windows\winforms\FacMan.WinForms.csproj /p:Configuration=Debug
      - name: Smoke WinForms command client
        run: python tools/winforms_command_client_smoke.py
      - name: Run Windows Python unit tests
        run: python -m unittest discover -s tests -v
      - name: Run required Windows package proof with zero skips
        run: python tools/required_package_proof.py
      - name: Run strict policy checks
        run: python tools/strict_check.py
      - name: Build selected Windows static package
        run: python tools/package_build.py --profile windows_portable_cli_x64 --out build/packages --build-root build/native-smoke
      - name: Verify and smoke selected Windows static package
        run: |
          python tools/package_hash_manifest.py --root build/packages/windows_portable_cli_x64 --verify
          python tools/package_runtime_smoke.py --root build/packages/windows_portable_cli_x64
      - name: Build and smoke Windows x64 TUI preview package
        run: |
          python tools/package_build.py --profile windows_portable_tui_x64 --out build/tui-packages --build-root build/native-smoke --dist build/tui-dist
          python tools/package_runtime_smoke.py --root build/tui-packages/windows_portable_tui_x64
      - name: Build and smoke legacy WinForms compatibility package
        run: |
          python tools/package_build.py --profile windows_legacy_winforms_x64 --out build/packages --build-root build/native-smoke
          python tools/package_runtime_smoke.py --root build/packages/windows_legacy_winforms_x64

  macos-archive-core:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Configure macOS archive core
        run: cmake -S . -B build/macos-archive -DFLAUNCH_BUILD_NATIVE_APPS=OFF
      - name: Build macOS archive core
        run: >-
          cmake --build build/macos-archive --target
          fl_archive_core_smoke fl_archive_probe
          fl_archive_metadata_fuzz fl_archive_plan_fuzz
      - name: Run macOS archive core smoke
        run: |
          set +e
          ./build/macos-archive/fl_archive_core_smoke
          code=$?
          set -e
          if [ "$code" -ne 0 ]; then
            echo "::error title=macOS archive smoke::native smoke exited with stage code $code"
            exit "$code"
          fi

  macos-native-cli:
    runs-on: macos-15-intel
    env:
      FACMAN_CLI_EXE: ${{ github.workspace }}/build/macos-native/facman
      FACMAN_TUI_EXE: ${{ github.workspace }}/build/macos-native/facman-tui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install locked development validators
        run: python -m pip install -r tools/requirements-dev.lock
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Prepare no-link temporary root
        run: |
          export TMPDIR="$RUNNER_TEMP/facman-native-tmp"
          mkdir -p "$TMPDIR"
          test "$(python -c 'import os; print(os.path.realpath(os.environ["TMPDIR"]))')" = "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - name: Configure complete macOS Intel native core
        run: >-
          cmake -S . -B build/macos-native
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
          -DFLAUNCH_BUILD_NATIVE_APPS=ON
          -DFACMAN_BUILD_TUI=ON
          -DFACMAN_WARNINGS_AS_ERRORS=ON
      - name: Build complete macOS Intel native core
        run: cmake --build build/macos-native
      - name: Run complete macOS native CTest suite
        run: ctest --test-dir build/macos-native --output-on-failure
      - name: Run complete portable Python suite on macOS
        run: python -m unittest discover -s tests -v
      - name: Run strict policy checks on macOS
        run: python tools/strict_check.py
      - name: Run required macOS Intel CLI package proof with zero skips
        run: >-
          python tools/macos_package_proof.py
          --build-root build/macos-native
          --out build/macos-package-proof/packages
          --dist build/macos-package-proof/dist
          --evidence build/macos-package-proof/evidence.v1.json
      - name: Build and smoke macOS Intel TUI preview package
        run: |
          python tools/package_build.py --profile macos_portable_tui_x64 --out build/tui-packages --build-root build/macos-native --dist build/tui-dist
          python tools/package_runtime_smoke.py --root build/tui-packages/macos_portable_tui_x64
      - name: Preserve unsigned macOS package proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-portable-cli-x64-${{ github.sha }}
          path: |
            build/macos-package-proof/dist/*.tar.gz
            build/macos-package-proof/dist/*.provenance.v1.json
            build/macos-package-proof/evidence.v1.json
            build/tui-dist/*macos-tui-x64-portable.tar.gz
          if-no-files-found: error
          retention-days: 14

  appkit-compile:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - name: Compile AppKit shell sources
        run: |
          mkdir -p build/appkit-smoke
          clang -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/AppDelegate.m \
            -o build/appkit-smoke/AppDelegate.o
          clang -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/MainWindowController.m \
            -o build/appkit-smoke/MainWindowController.o
          clang++ -std=c++17 -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/CommandClient.mm \
            -o build/appkit-smoke/CommandClient.o
          clang -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/FacManGeneratedCommandCatalog.m \
            -o build/appkit-smoke/FacManGeneratedCommandCatalog.o
          clang++ -std=c++17 -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/CliProcessClient.mm \
            -o build/appkit-smoke/CliProcessClient.o
