name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python tools/schema_validate.py
      - run: python tools/package_check.py
      - run: factorio-launcher --version
      - run: factorio-launcher product inspect
      - run: factorio-launcher doctor
      - run: cmake -S . -B build/native-smoke -DFLAUNCH_BUILD_NATIVE_APPS=ON
      - run: cmake --build build/native-smoke
