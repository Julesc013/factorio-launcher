name: ci

on:
  push:
  pull_request:

jobs:
  linux-native:
    runs-on: ubuntu-24.04
    env:
      FACMAN_CLI_EXE: ${{ github.workspace }}/build/native-smoke/facman
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Configure native core
        run: cmake -S . -B build/native-smoke -DFLAUNCH_BUILD_NATIVE_APPS=ON
      - name: Build native core
        run: cmake --build build/native-smoke
      - name: Run native tests
        run: ctest --test-dir build/native-smoke --output-on-failure
      - name: Configure sanitized archive proof
        run: >-
          cmake -S . -B build/archive-sanitized
          -DFLAUNCH_BUILD_NATIVE_APPS=OFF
          -DFLAUNCH_ENABLE_SANITIZERS=ON
      - name: Build sanitized archive proof
        run: >-
          cmake --build build/archive-sanitized --target
          fl_archive_core_smoke fl_archive_probe
          fl_archive_metadata_fuzz fl_archive_plan_fuzz
      - name: Run sanitized archive corpus and fuzz proof
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          FACMAN_FL_ARCHIVE_PROBE_EXE: ${{ github.workspace }}/build/archive-sanitized/fl_archive_probe
          FACMAN_FL_ARCHIVE_METADATA_FUZZ_EXE: ${{ github.workspace }}/build/archive-sanitized/fl_archive_metadata_fuzz
          FACMAN_FL_ARCHIVE_PLAN_FUZZ_EXE: ${{ github.workspace }}/build/archive-sanitized/fl_archive_plan_fuzz
        run: |
          ctest --test-dir build/archive-sanitized -R fl_archive_core_smoke --output-on-failure
          python -m unittest tests.test_archive_core -v
      - name: Run Python unit tests
        run: python -m unittest discover -s tests -v
      - name: Run strict policy checks
        run: python tools/strict_check.py
      - name: Native CLI smoke
        run: |
          ./build/native-smoke/facman --version
          ./build/native-smoke/facman product inspect
          ./build/native-smoke/facman doctor
      - name: Build enabled portable compatibility profiles
        run: |
          python tools/package_build.py --profile portable_cli_x64 --out build/packages --build-root build/native-smoke
          python tools/package_build.py --profile portable_tui_x64 --out build/packages --build-root build/native-smoke
      - name: Smoke portable compatibility profiles
        run: |
          python tools/package_runtime_smoke.py --root build/packages/portable_cli_x64
          python tools/package_runtime_smoke.py --root build/packages/portable_tui_x64
      - name: Run required Linux x64 CLI package proof with zero skips
        run: >-
          python tools/linux_package_proof.py
          --build-root build/native-smoke
          --out build/linux-package-proof/packages
          --dist build/linux-package-proof/dist
          --evidence build/linux-package-proof/evidence.v1.json
      - name: Preserve unsigned Linux package proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable-cli-x64-${{ github.sha }}
          path: |
            build/linux-package-proof/dist/*.tar.gz
            build/linux-package-proof/dist/*.provenance.v1.json
            build/linux-package-proof/evidence.v1.json
          if-no-files-found: error
          retention-days: 14

  windows-native-package:
    runs-on: windows-2022
    env:
      FACMAN_CLI_EXE: ${{ github.workspace }}\build\native-smoke\Debug\facman.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: microsoft/setup-msbuild@v3
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Configure Windows native core
        run: cmake -S . -B build/native-smoke -DFLAUNCH_BUILD_NATIVE_APPS=ON
      - name: Build Windows native core
        run: cmake --build build/native-smoke --config Debug
      - name: Run Windows native tests
        run: ctest --test-dir build/native-smoke -C Debug --output-on-failure
      - name: Build WinForms shell
        run: msbuild apps\gui\windows\winforms\FacMan.WinForms.csproj /p:Configuration=Debug
      - name: Smoke WinForms command client
        run: python tools/winforms_command_client_smoke.py
      - name: Run Windows Python unit tests
        run: python -m unittest discover -s tests -v
      - name: Run required Windows package proof with zero skips
        run: python tools/required_package_proof.py
      - name: Run strict policy checks
        run: python tools/strict_check.py
      - name: Build selected Windows static package
        run: python tools/package_build.py --profile windows_portable_cli_x64 --out build/packages --build-root build/native-smoke
      - name: Verify and smoke selected Windows static package
        run: |
          python tools/package_hash_manifest.py --root build/packages/windows_portable_cli_x64 --verify
          python tools/package_runtime_smoke.py --root build/packages/windows_portable_cli_x64
      - name: Build and smoke legacy WinForms compatibility package
        run: |
          python tools/package_build.py --profile windows_legacy_winforms_x64 --out build/packages --build-root build/native-smoke
          python tools/package_runtime_smoke.py --root build/packages/windows_legacy_winforms_x64

  macos-archive-core:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Configure macOS archive core
        run: cmake -S . -B build/macos-archive -DFLAUNCH_BUILD_NATIVE_APPS=OFF
      - name: Build macOS archive core
        run: >-
          cmake --build build/macos-archive --target
          fl_archive_core_smoke fl_archive_probe
          fl_archive_metadata_fuzz fl_archive_plan_fuzz
      - name: Run macOS archive core smoke
        run: |
          set +e
          ./build/macos-archive/fl_archive_core_smoke
          code=$?
          set -e
          if [ "$code" -ne 0 ]; then
            echo "::error title=macOS archive smoke::native smoke exited with stage code $code"
            exit "$code"
          fi

  macos-native-cli:
    runs-on: macos-15-intel
    env:
      FACMAN_CLI_EXE: ${{ github.workspace }}/build/macos-native/facman
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align dependency revisions to workspace lock
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Prepare no-link temporary root
        run: |
          export TMPDIR="$RUNNER_TEMP/facman-native-tmp"
          mkdir -p "$TMPDIR"
          test "$(python -c 'import os; print(os.path.realpath(os.environ["TMPDIR"]))')" = "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> "$GITHUB_ENV"
      - name: Configure complete macOS Intel native core
        run: >-
          cmake -S . -B build/macos-native
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
          -DFLAUNCH_BUILD_NATIVE_APPS=ON
      - name: Build complete macOS Intel native core
        run: cmake --build build/macos-native
      - name: Run complete macOS native CTest suite
        run: ctest --test-dir build/macos-native --output-on-failure
      - name: Run complete portable Python suite on macOS
        run: python -m unittest discover -s tests -v
      - name: Run strict policy checks on macOS
        run: python tools/strict_check.py
      - name: Run required macOS Intel CLI package proof with zero skips
        run: >-
          python tools/macos_package_proof.py
          --build-root build/macos-native
          --out build/macos-package-proof/packages
          --dist build/macos-package-proof/dist
          --evidence build/macos-package-proof/evidence.v1.json
      - name: Preserve unsigned macOS package proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-portable-cli-x64-${{ github.sha }}
          path: |
            build/macos-package-proof/dist/*.tar.gz
            build/macos-package-proof/dist/*.provenance.v1.json
            build/macos-package-proof/evidence.v1.json
          if-no-files-found: error
          retention-days: 14

  appkit-compile:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - name: Compile AppKit shell sources
        run: |
          mkdir -p build/appkit-smoke
          clang -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/AppDelegate.m \
            -o build/appkit-smoke/AppDelegate.o
          clang -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/MainWindowController.m \
            -o build/appkit-smoke/MainWindowController.o
          clang++ -std=c++17 -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/CommandClient.mm \
            -o build/appkit-smoke/CommandClient.o
          clang++ -std=c++17 -fobjc-arc -fblocks -fmodules -mmacosx-version-min=10.13 \
            -Iapps/gui/macos/appkit \
            -framework Cocoa \
            -c apps/gui/macos/appkit/CliProcessClient.mm \
            -o build/appkit-smoke/CliProcessClient.o
