name: release-policy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  unpublished-release-gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Clone universal repositories
        run: |
          git clone https://github.com/Julesc013/universal-setup.git ../universal-setup
          git clone https://github.com/Julesc013/universal-launcher.git ../universal-launcher
      - name: Align locked sibling revisions
        run: python tools/verify_dependency_revisions.py --align --lock release/index/workspace_lock.v1.toml
      - name: Validate release contracts
        run: |
          python tools/release_contract_check.py
          python tools/release_structure_check.py
      - name: Preserve unpublished boundary
        run: |
          python -c "from pathlib import Path; text=Path('docs/release/built_package_artifacts.md').read_text(); assert 'No package has been published' in text"
