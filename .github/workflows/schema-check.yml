name: schema-check

on:
  push:
    paths:
      - "schemas/**"
      - "tools/schema_validate.py"
      - "tools/package_check.py"
      - "packaging/**"
  pull_request:
    paths:
      - "schemas/**"
      - "tools/schema_validate.py"
      - "tools/package_check.py"
      - "packaging/**"

jobs:
  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tools/schema_validate.py
      - run: python tools/package_check.py
